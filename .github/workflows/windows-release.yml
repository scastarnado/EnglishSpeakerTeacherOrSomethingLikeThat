name: Build Windows EXE and Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build executable and publish commit release
    runs-on: windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: npm

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/ai-service/requirements.txt

      - name: Prepare Visual Studio build tools
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Node dependencies
        run: npm ci
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          npm_config_python: ${{ steps.setup-python.outputs.python-path }}
          GYP_MSVS_VERSION: "2022"

      - name: Install Python dependencies
        working-directory: apps/ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set release version
        shell: pwsh
        run: npm version "1.0.${{ github.run_number }}" --workspace=@c1sc/desktop --no-git-tag-version

      - name: Type-check desktop app
        run: npm run type-check --workspace=@c1sc/desktop

      - name: Package Python AI service
        run: npm run package:ai

      - name: Build Windows installer
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          npm_config_python: ${{ steps.setup-python.outputs.python-path }}
          GYP_MSVS_VERSION: "2022"

      - name: Locate installer
        id: installer
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $installer = Get-ChildItem -Path "apps/desktop/release" -Recurse -Filter "*.exe" |
            Where-Object { $_.Name -like "*Setup*.exe" } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $installer) {
            throw "Could not find the generated Windows installer."
          }

          $unpacked = Join-Path $installer.DirectoryName "win-unpacked"
          if (-not (Test-Path $unpacked)) {
            throw "Could not find the generated win-unpacked executable folder."
          }

          $zip = Join-Path $installer.DirectoryName "C1-Speaking-Coach-win-unpacked-$shortSha.zip"
          if (Test-Path $zip) {
            Remove-Item -LiteralPath $zip -Force
          }
          Compress-Archive -Path (Join-Path $unpacked "*") -DestinationPath $zip -Force

          $blockmap = Get-ChildItem -Path $installer.DirectoryName -Filter "$($installer.Name).blockmap" -ErrorAction SilentlyContinue |
            Select-Object -First 1

          $updateMetadata = Get-ChildItem -Path $installer.DirectoryName -Filter "latest*.yml" -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $updateMetadata) {
            throw "Could not find the auto-update metadata (latest.yml)."
          }

          "installer=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "installer_name=$($installer.Name)" >> $env:GITHUB_OUTPUT
          "unpacked_zip=$zip" >> $env:GITHUB_OUTPUT
          if ($blockmap) {
            "blockmap=$($blockmap.FullName)" >> $env:GITHUB_OUTPUT
          }
          "update_metadata=$($updateMetadata.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.sha }}
          path: |
            ${{ steps.installer.outputs.installer }}
            ${{ steps.installer.outputs.blockmap }}
            ${{ steps.installer.outputs.update_metadata }}
            ${{ steps.installer.outputs.unpacked_zip }}
          if-no-files-found: error

      - name: Build release metadata
        id: release_meta
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $branch = "${{ github.ref_name }}" -replace "[^A-Za-z0-9._-]", "-"
          $tag = "auto-win-$branch-$shortSha"
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=Windows executable $shortSha" >> $env:GITHUB_OUTPUT
          @"
          Automated Windows build for commit ${{ github.sha }}.

          Branch: ${{ github.ref_name }}
          Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Assets:
          - Windows installer (.exe)
          - Installer blockmap
          - Ready-to-run win-unpacked zip
          "@ | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          make_latest: ${{ github.ref_name == 'main' }}
          files: |
            ${{ steps.installer.outputs.installer }}
            ${{ steps.installer.outputs.blockmap }}
            ${{ steps.installer.outputs.update_metadata }}
            ${{ steps.installer.outputs.unpacked_zip }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
